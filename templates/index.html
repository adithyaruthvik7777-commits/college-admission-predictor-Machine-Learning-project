<!DOCTYPE html>
<html>
<head>
<title>College Admission Predictor</title>
</head>

<body>

<h2>Graduate Admission Predictor</h2>

<form action="/predict" method="post">

GRE Score:
<input type="number" name="gre" required><br><br>

TOEFL Score:
<input type="number" name="toefl" required><br><br>

University Rating:
<input type="number" name="rating" step="0.1" required><br><br>

SOP Strength:
<input type="number" name="sop" step="0.1" required><br><br>

LOR Strength:
<input type="number" name="lor" step="0.1" required><br><br>

CGPA:
<input type="number" name="cgpa" step="0.01" required><br><br>

Research Experience (0 or 1):
<input type="number" name="research" required><br><br>

<button type="submit">Predict Admission Chance</button>

</form>

</body>
</html>
